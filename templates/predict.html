<!DOCTYPE html>
<html>
<head>
    <title>Heart Risk Assessment</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0D1B2A, #1B9AAA);
            min-height: 100vh;
            padding: 40px;
            color: #fff;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #ffffffcc;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #1B9AAA;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #2A9D8F;
        }

        /* RESULT CARD */

        .result-card {
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .gauge {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: conic-gradient(#2A9D8F 0%, #E5E5E5 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            transition: 1s ease;
        }

        .gauge::before {
            content: "";
            width: 170px;
            height: 170px;
            background: #0D1B2A;
            border-radius: 50%;
            position: absolute;
        }

        .gauge span {
            position: relative;
            font-size: 30px;
            font-weight: 600;
        }

        .risk-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .summary {
            margin-top: 15px;
            font-size: 14px;
            text-align: left;
        }

        .recommendation {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>

<h1><i class="fas fa-heartbeat"></i> Heart Disease Risk Assessment</h1>

<div class="container">

    <!-- LEFT FORM -->
    <div class="card">

        <div class="form-group">
            <label>Age (Years)</label>
            <input type="number" id="age">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="sex">
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Chest Pain Type</label>
            <select id="cp">
                <option value="0">Typical Angina</option>
                <option value="1">Atypical Angina</option>
                <option value="2">Non-anginal Pain</option>
                <option value="3">Asymptomatic</option>
            </select>
        </div>

        <div class="form-group">
            <label>Resting Blood Pressure</label>
            <input type="number" id="trestbps">
        </div>

        <div class="form-group">
            <label>Serum Cholesterol</label>
            <input type="number" id="chol">
        </div>

        <div class="form-group">
            <label>Fasting Blood Sugar</label>
            <select id="fbs">
                <option value="0">≤ 120 mg/dl</option>
                <option value="1">> 120 mg/dl</option>
            </select>
        </div>

        <div class="form-group">
            <label>Resting ECG</label>
            <select id="restecg">
                <option value="0">Normal</option>
                <option value="1">ST-T Abnormality</option>
                <option value="2">LV Hypertrophy</option>
            </select>
        </div>

        <div class="form-group">
            <label>Maximum Heart Rate</label>
            <input type="number" id="thalach">
        </div>

        <div class="form-group">
            <label>Exercise Induced Angina</label>
            <select id="exang">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label>ST Depression</label>
            <input type="number" step="0.1" id="oldpeak">
        </div>

        <div class="form-group">
            <label>Slope of ST Segment</label>
            <select id="slope">
                <option value="0">Upsloping</option>
                <option value="1">Flat</option>
                <option value="2">Downsloping</option>
            </select>
        </div>

        <div class="form-group">
            <label>Major Vessels</label>
            <select id="ca">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div class="form-group">
            <label>Thalassemia</label>
            <select id="thal">
                <option value="1">Normal</option>
                <option value="2">Fixed Defect</option>
                <option value="3">Reversible Defect</option>
            </select>
        </div>

        <button onclick="predict()">Analyze Cardiovascular Risk</button>

    </div>

    <!-- RIGHT RESULT -->
    <div class="card result-card" id="resultCard">

        <div class="gauge" id="gauge">
            <span id="confidenceText">0%</span>
        </div>

        <div class="risk-title" id="riskTitle"></div>

        <div class="summary" id="summary"></div>

        <div class="recommendation" id="recommendation"></div>

    </div>

</div>

<script>
function predict() {

    const data = {
        age: age.value,
        sex: sex.value,
        cp: cp.value,
        trestbps: trestbps.value,
        chol: chol.value,
        fbs: fbs.value,
        restecg: restecg.value,
        thalach: thalach.value,
        exang: exang.value,
        oldpeak: oldpeak.value,
        slope: slope.value,
        ca: ca.value,
        thal: thal.value
    };

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(result => {

        document.getElementById("resultCard").style.display = "flex";

        let confidence = result.confidence_percentage;

        document.getElementById("confidenceText").innerText = confidence + "%";

        let gauge = document.getElementById("gauge");
        gauge.style.background =
            `conic-gradient(${confidence > 70 ? "#E63946" : confidence > 40 ? "#F4A261" : "#2A9D8F"} ${confidence}%, #E5E5E5 ${confidence}%)`;

        document.getElementById("riskTitle").innerHTML = result.prediction;
        document.getElementById("summary").innerHTML = result.explanation;

        document.getElementById("recommendation").innerHTML =
            confidence > 70 ?
            "⚠ Immediate cardiologist consultation recommended." :
            confidence > 40 ?
            "⚠ Lifestyle changes & medical evaluation advised." :
            "✔ Maintain healthy habits & routine checkups.";

    });
}
</script>

</body>
</html>
