<!DOCTYPE html>
<html>
<head>
    <title>Login - MedLink AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0D1B2A, #1B9AAA, #0F3057, #1B9AAA);
            background-size: 400% 400%;
            animation: gradientMove 18s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating heartbeat watermark */
        .heartbeat {
            position: absolute;
            font-size: 280px;
            opacity: 0.04;
            animation: float 12s infinite ease-in-out;
        }

        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .wrapper {
            width: 1000px;
            height: 560px;
            display: flex;
            border-radius: 25px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 30px 70px rgba(0,0,0,0.45);
            z-index: 2;
        }

        .branding {
            flex: 1;
            padding: 70px;
            background: rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .branding h1 {
            font-size: 38px;
            margin-bottom: 20px;
        }

        .branding p {
            opacity: 0.85;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .testimonial {
            margin-top: 40px;
            font-size: 13px;
            opacity: 0.75;
            font-style: italic;
        }

        .login-box {
            flex: 1;
            padding: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
        }

        .micro-text {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 0 2px #1B9AAA;
        }

        .toggle {
            position: absolute;
            right: 15px;
            top: 16px;
            cursor: pointer;
            font-size: 13px;
            color: #1B9AAA;
        }

        .strength {
            height: 6px;
            border-radius: 6px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.2);
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: 0.3s;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg,#1B9AAA,#2A9D8F,#1B9AAA);
            background-size: 200%;
            color: white;
            transition: 0.4s;
        }

        button:hover {
            background-position: right;
            transform: translateY(-2px);
        }

        .extra {
            margin-top: 20px;
            font-size: 13px;
        }

        .extra a {
            color: #2A9D8F;
            text-decoration: none;
        }

    </style>
</head>
<body>

<div class="heartbeat">❤</div>

<div class="wrapper">

    <div class="branding">
        <h1>MedLink AI</h1>
        <p>
            AI-powered healthcare intelligence delivering predictive insights,
            clinical-grade analysis and smart decision support.
        </p>

        <div class="testimonial">
            “Trusted by 500+ health-conscious users.”
        </div>
    </div>

    <div class="login-box">
        <h2>Welcome Back 👋</h2>
        <div class="micro-text">AI assisting 2,000+ health assessments</div>

        <form action="/login" method="POST">

            <input type="email" name="email" placeholder="Email Address" required>

            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Password" required oninput="checkStrength()">
                <span class="toggle" onclick="togglePassword()">Show</span>
            </div>

            <div class="strength">
                <div class="strength-bar" id="strengthBar"></div>
            </div>

            <button type="submit">Login to Dashboard</button>

        </form>

        <div class="extra">
            Don’t have an account? <a href="/register">Create Account</a>
        </div>

    </div>

</div>

<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}

function checkStrength() {
    const pwd = document.getElementById("password").value;
    const bar = document.getElementById("strengthBar");
    let strength = 0;

    if (pwd.length > 6) strength += 25;
    if (/[A-Z]/.test(pwd)) strength += 25;
    if (/[0-9]/.test(pwd)) strength += 25;
    if (/[^A-Za-z0-9]/.test(pwd)) strength += 25;

    bar.style.width = strength + "%";

    if (strength < 50) bar.style.background = "#E63946";
    else if (strength < 75) bar.style.background = "#F4A261";
    else bar.style.background = "#2A9D8F";
}
</script>

</body>
</html>
