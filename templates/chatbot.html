<!DOCTYPE html>
<html>
<head>
    <title>MedLink AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* SAME BACKGROUND AS NEARBY PAGE */
        body {
            background: linear-gradient(135deg, #0D1B2A, #1B9AAA);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .navbar {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            font-weight: 600;
        }

        .back-btn {
            background: #E63946;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
        }

        .chat-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .chat-container {
            width: 800px;
            max-width: 95%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 70vh;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 70%;
            width: fit-content;
            word-wrap: break-word;
        }

        /* USER MESSAGE - RIGHT */
        .user {
            background: #1B9AAA;
            align-self: flex-end;
        }

        /* BOT MESSAGE - LEFT */
        .bot {
            background: rgba(255,255,255,0.25);
            align-self: flex-start;
        }

        .input-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.3);  /* Different from chat area */
            padding: 10px;
            border-radius: 15px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
        }

        .input-area button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: #1B9AAA;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .input-area button:hover {
            background: #147b80;
        }

    </style>
</head>
<body>

<div class="navbar">
    <h2>MedLink AI Chatbot 🤖</h2>
    <a href="/dashboard" class="back-btn">Back</a>
</div>

<div class="chat-wrapper">
    <div class="chat-container">

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Ask your health question..." />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

<script>
function sendMessage() {

    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    if (!message) return;

    const chatBox = document.getElementById("chatBox");

    const userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = message;
    chatBox.appendChild(userDiv);

    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {

        const botDiv = document.createElement("div");
        botDiv.className = "message bot";
        botDiv.innerText = data.response;
        chatBox.appendChild(botDiv);

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}
</script>

</body>
</html>
